<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Every Layout — Dashboard</title>
    <link rel="stylesheet" href="../../every-layout.css" />
  </head>
  <body>
    <main class="center" style="--measure: 80rem;">
      <div class="grid" style="--grid-min: 14rem;">
        <div class="box"><div class="stack"><h3>Revenue</h3><p>$42k</p></div></div>
        <div class="box"><div class="stack"><h3>Users</h3><p>1,204</p></div></div>
        <div class="box"><div class="stack"><h3>Churn</h3><p>2.1%</p></div></div>
        <div class="box"><div class="stack"><h3>NPS</h3><p>61</p></div></div>
      </div>
    </main>
  </body>
</html>
